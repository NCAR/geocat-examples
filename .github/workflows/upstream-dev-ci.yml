name: CI Upstream
on:
  schedule:
    - cron: "0 0 * * 0" # daily at 00:00 UTC
  workflow_dispatch: # allows you to trigger the workflow run manually

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  upstream-dev:
    name: upstream-dev
    runs-on: ubuntu-latest
    continue-on-error: true
    defaults:
      run:
        shell: bash -l {0}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.13"]
    outputs:
      testresults: ${{ steps.build.outcome }}
    steps:
      - name: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0 # fetch all history for all branches and tags.
      - name: set up environment
        uses: mamba-org/setup-micromamba@d7c9bd84e824b79d2af72a2d4196c7f4300d3476 # v3.0.0
        with:
          environment-file: conda_environment.yml
          create-args: >-
            python=${{ matrix.python-version }}
      - name: install upstream versions
        run: |
          bash ci/install-upstream.sh
      - name: environment info
        run: |
          conda info
          conda list
      - name: build
        id: build
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60 # v4.0.0
        with:
           timeout_minutes: 20
           max_attempts: 3
           command: |
              eval "$(micromamba shell hook --shell bash)"
              micromamba activate
              micromamba activate geocat-examples
              cd docs
              make html

  failure-issue:
    name: failure-issue
    needs: upstream-dev
    if: |
      (needs.upstream-dev.outputs.testresults != 'success')
      && github.repository == 'NCAR/geocat-examples'
      && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -l {0}
    steps:
      - name: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Create or update failure issue
        shell: bash
        run: |
          # Read the template
          template=$(cat .github/upstream-failure-issue-template.md)

          # Replace placeholders
          issue_body="${template//\{\{WORKFLOW\}\}/${{ github.workflow }}}"
          issue_body="${issue_body//\{\{RUN_ID\}\}/${{ github.run_id }}}"
          issue_body="${issue_body//\{\{RUN_URL\}\}/${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}}"
          issue_body="${issue_body//\{\{DATE\}\}/$(date -u)}"

          # Check for existing open issue with same title
          issue_title="🤖 Upstream testing failure"
          existing_issue=$(gh issue list --state open --label "testing" --search "\"$issue_title\" in:title" --json number --jq '.[0].number // empty')

          if [ -n "$existing_issue" ]; then
            echo "Found existing open issue #$existing_issue, updating it..."
            echo "$issue_body" | gh issue edit "$existing_issue" --body-file -
            echo "Updated existing issue #$existing_issue"
          else
            echo "No existing open issue found, creating new one..."
            echo "$issue_body" | gh issue create \
              --title "$issue_title" \
              --body-file - \
              --label "testing"
            echo "Created new issue"
          fi
        env:
          GH_TOKEN: ${{ github.token }}

  report-failed:
    name: report-failed
    needs: [upstream-dev, failure-issue]
    if: ${{needs.upstream-dev.outputs.testresults != 'success'}}
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -l {0}
    steps:
      - name: make sure to report a failed workflow
        shell: bash
        run: |
          exit 1;
